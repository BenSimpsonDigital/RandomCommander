<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Random Commander Finder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16141d"/>
      <stop offset="1" stop-color="#08070b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecd7a0"/>
      <stop offset=".5" stop-color="#c9a24b"/>
      <stop offset="1" stop-color="#8a6c2a"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"
        stroke="#c9a24b" stroke-opacity=".45" stroke-width="1.5"/>

  <!-- crown -->
  <path d="M15 44 L15 26 L23.5 34 L32 19 L40.5 34 L49 26 L49 44 Z" fill="url(#gold)"/>
  <!-- base band -->
  <rect x="14" y="43" width="36" height="7" rx="2.5" fill="url(#gold)"/>

  <!-- jewels on the peaks -->
  <circle cx="15" cy="25.5" r="2.4" fill="#e0c47e"/>
  <circle cx="32" cy="18.5" r="2.9" fill="#e0c47e"/>
  <circle cx="49" cy="25.5" r="2.4" fill="#e0c47e"/>

  <!-- centre gem on the band -->
  <circle cx="32" cy="46.5" r="2.1" fill="#08070b" fill-opacity=".55"/>
</svg>
